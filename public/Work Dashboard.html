<script>
// file:// guard (plain JS so it runs even when the app code can't): this dashboard
// must be served over http://localhost — a file:// page renders blank because the
// browser blocks Babel from loading the .jsx files. Show a clear pointer instead.
(function () {
  if (location.protocol !== 'file:') return;
  var url = 'http://localhost:8787/Work%20Dashboard.html';
  var render = function () {
    document.body.innerHTML =
      '<div style="max-width:580px;margin:16vh auto;padding:28px;font:15px/1.6 system-ui,-apple-system,sans-serif;color:#1a1a1a;text-align:center">'
      + '<div style="font-size:42px;margin-bottom:10px">📊</div>'
      + '<h2 style="margin:0 0 8px">Open the dashboard over localhost</h2>'
      + '<p style="color:#555">You\'ve opened this as a <b>file</b>, which the browser can\'t render (it blocks loading the app code). Open it through the local server instead:</p>'
      + '<p><a href="' + url + '" style="display:inline-block;margin:8px 0;padding:11px 18px;background:#2f6df6;color:#fff;text-decoration:none;border-radius:8px;font-weight:600">Open ' + url + '</a></p>'
      + '<p style="color:#888;font-size:13px">If that page doesn\'t load, start the server first — ask Claude Code to <b>"open the dashboard"</b> (or run <code>schedule.sh serve</code>). Using a custom port? Use <code>http://localhost:&lt;your-port&gt;/Work%20Dashboard.html</code>.</p>'
      + '</div>';
  };
  if (document.body) render(); else document.addEventListener('DOMContentLoaded', render);
})();
</script>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script>
// =============================================================================
// Tab favicon = the user's Slack profile photo (v0.9.2). build-overrides.py puts
// the avatar URL on SEED.user.avatar (fetched by the slack agent). We swap the tab
// icon to it once SEED loads; until then the bundled W mark shows. Falls back to W
// if there's no avatar (no Slack / fresh install).
// =============================================================================
(function setFaviconFromSlack() {
  let tries = 0;
  const t = setInterval(() => {
    tries += 1;
    var url = window.SEED && window.SEED.user && window.SEED.user.avatar;
    if (!url) {                                  // keep waiting — the override (with the
      if (tries < 100) return;                   // avatar) may load after SEED first appears
      clearInterval(t); return;                  // give up after ~20s → bundled W stays
    }
    clearInterval(t);
    var link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.setAttribute('rel', 'icon');
    link.removeAttribute('type');               // let the browser sniff (Slack serves jpg/png)
    link.setAttribute('href', url);
    if (!link.parentNode) document.head.appendChild(link);
  }, 200);
})();

// =============================================================================
// Sample-data banner (v0.5.0): until the first /dashboard refresh rewrites
// data-override.jsx, the dashboard renders the bundled demo dataset ("Alex").
// Make that unmistakable so a fresh install never looks broken or like someone
// else's data. The babel scripts load async, so poll briefly for window.SEED.
// =============================================================================
(function demoBanner() {
  let tries = 0;
  const t = setInterval(() => {
    tries += 1;
    if (!window.SEED && tries < 100) return;       // keep waiting (max ~20s)
    clearInterval(t);
    if (!window.SEED || window.SEED.demo !== true) return;
    const b = document.createElement('div');
    b.id = 'demo-banner';
    b.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#121117;color:#fff;padding:9px 16px;border-radius:8px;font:13px/1.4 system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;gap:10px;align-items:center';
    b.innerHTML = '<span>👋 You\'re looking at <b>sample data</b> — run <code style="background:rgba(255,255,255,.15);padding:1px 6px;border-radius:4px">/dashboard</code> in Claude Code to load yours.</span>';
    const x = document.createElement('button');
    x.textContent = '✕';
    x.style.cssText = 'background:none;border:none;color:#fff;opacity:.7;cursor:pointer;font-size:13px;padding:0';
    x.onclick = () => b.remove();
    b.appendChild(x);
    document.body.appendChild(b);
  }, 200);
})();

// =============================================================================
// Auto-reload (v0.4.0): poll Work Dashboard.html every 30s for cache-version
// bumps. When the dashboard skill rewrites data-override.jsx or drive-index.jsx,
// it increments their ?v=N suffix here. We detect that and reload so the open
// tab always reflects the latest refresh — no manual reload required.
//
// UX: if the tab is hidden when fresh data lands, reload immediately. If
// visible, show a tiny non-blocking banner so we don't wipe scroll / open
// modules mid-interaction. Either way: click the banner to reload now.
// =============================================================================
(function autoReload() {
  const POLL_INTERVAL_MS = 30 * 1000;  // 30s — local fetch, basically free

  function readVersions(htmlText) {
    const m = htmlText.match(/(?:data-override|drive-index)\.jsx\?v=\d+/g) || [];
    return m.sort().join('|');
  }

  // Capture the versions we loaded with — anything different from this is "fresh data"
  const loadedVersions = readVersions(document.documentElement.outerHTML);
  let pendingFresh = false;

  // Reload + leave a marker so the refresh banner knows the data actually landed
  // (so it resolves/clears instead of hanging on "Refreshing…" after an update).
  function reloadFresh() {
    try { sessionStorage.setItem('dash:freshReload', String(Date.now())); } catch (e) {}
    window.location.reload();
  }

  function showFreshBanner() {
    if (document.getElementById('auto-reload-banner')) return;
    const b = document.createElement('div');
    b.id = 'auto-reload-banner';
    b.style.cssText = 'position:fixed;top:12px;right:12px;z-index:9999;background:#0b6;color:#fff;padding:8px 12px;border-radius:6px;font:13px/1.4 system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.18);cursor:pointer';
    b.textContent = 'Fresh data available — click to reload';
    b.onclick = () => reloadFresh();
    document.body.appendChild(b);
  }

  async function check() {
    try {
      const r = await fetch(window.location.pathname + '?_t=' + Date.now(), { cache: 'no-store' });
      const html = await r.text();
      const current = readVersions(html);
      if (current && current !== loadedVersions) {
        if (document.visibilityState === 'hidden') {
          reloadFresh();
        } else {
          pendingFresh = true;
          showFreshBanner();
        }
      }
    } catch (e) { /* silent — don't break the dashboard if polling fails */ }
  }

  // Reload immediately if user switches back to the tab and fresh data was queued
  document.addEventListener('visibilitychange', () => {
    if (pendingFresh && document.visibilityState === 'visible') {
      reloadFresh();
    }
  });

  setInterval(check, POLL_INTERVAL_MS);
})();
</script>
